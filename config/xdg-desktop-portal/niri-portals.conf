# xdg-desktop-portal backend selection for niri sessions.
# Screen sharing (org.freedesktop.portal.ScreenCast) is served by
# xdg-desktop-portal-gnome — niri implements the required Mutter
# ScreenCast D-Bus API on top of PipeWire. File pickers and dialogs
# come from the lighter GTK portal.
# Only applies when XDG_CURRENT_DESKTOP=niri, so a GNOME session on the
# same machine is unaffected.
[preferred]
default=gnome;gtk;
org.freedesktop.impl.portal.Access=gtk
org.freedesktop.impl.portal.Notification=gtk
org.freedesktop.impl.portal.FileChooser=gtk
org.freedesktop.impl.portal.Secret=gnome-keyring
